    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        :root { --primary: 134 76 255; }
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .ref-link { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .ref-link:focus { box-shadow: 0 0 0 4px rgb(134 76 255 / 0.3); }
        .share-btn { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
        .share-btn:hover { transform: translateY(-3px) scale(1.05); }
        .toast { animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hero-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .leaderboard-row { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
        .leaderboard-row:hover { transform: scale(1.02); background-color: rgba(134,76,255,0.1); }
        .crown { animation: crownFloat 3s ease-in-out infinite; }
        @keyframes crownFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .analytics-card { transition: transform 0.2s; }
        .analytics-card:hover { transform: translateY(-4px); }
        .winner-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .admin-tab { padding: 1.25rem 2rem; font-weight: 600; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .admin-tab-active { border-bottom: 3px solid rgb(var(--primary)); color: rgb(var(--primary)); }
        .highlight-glow { animation: glowPulse 2.2s ease-in-out forwards; box-shadow: 0 0 0 8px rgb(134 76 255 / 0.6); }
        @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgb(134 76 255 / 0.9); } 25% { box-shadow: 0 0 0 16px rgb(134 76 255 / 0.5); } 70% { box-shadow: 0 0 0 8px rgb(134 76 255 / 0.0); } 100% { box-shadow: 0 0 0 0 rgb(134 76 255 / 0.0); } }
        .copied-badge { position: absolute; top: -12px; right: 20px; background: #10b981; color: white; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 9999px; box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.3); animation: badgePop 0.4s ease forwards; pointer-events: none; }
        @keyframes badgePop { 0% { transform: scale(0.6) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .get-link-btn { position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .get-link-btn::after { content: ''; position: absolute; top: -50%; left: -150%; width: 60%; height: 200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent); transition: 0.7s; }
        .get-link-btn:hover::after { left: 200%; }
        .get-link-btn.loading { pointer-events: none; }
        .get-link-btn.success { background: #10b981 !important; color: white !important; transform: scale(1.05); }
        .qr-pulse { animation: qrPop 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes qrPop { 0% { transform: scale(0.85) rotate(-8deg); } 40% { transform: scale(1.15) rotate(6deg); } 70% { transform: scale(0.98) rotate(-3deg); } 100% { transform: scale(1) rotate(0deg); } }
        .floating-ready { position: fixed; font-size: 1.1rem; font-weight: 700; color: #22c55e; text-shadow: 0 0 20px #22c55e; pointer-events: none; z-index: 9999; animation: floatReady 2.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
        @keyframes floatReady { 0% { transform: translateY(30px) scale(0.6); opacity: 0; } 20% { transform: translateY(-30px) scale(1.15); opacity: 1; } 80% { transform: translateY(-140px) scale(1); } 100% { transform: translateY(-160px) scale(0.9); opacity: 0; } }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-100 min-h-screen">

<div class="pt-24 pb-16 max-w-6xl mx-auto px-6">

</div>

<script>
    // ====================== SUPABASE TINY BACKEND (YOUR REAL KEYS) ======================
    const SUPABASE_URL = 'https://wqbefjzpgsezzwdrvua.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxYmVmanpwZ3Nlenp3ZHJ2dnVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTMyNDAsImV4cCI6MjA4OTUyOTI0MH0.pVHqeG0sGPgpUlOlskf7rOvnAsdrzrv5govZXcyxEdk';

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let ADMIN_PASSWORD = "viraladmin2025";

    let config = {
        siteName: "AcmeApp",
        baseUrl: "https://oliversenterprises-viral.github.io/viral-visitor",
        rewardText: "the #1 referrer wins a full homepage banner promotion!",
        primaryColor: "134 76 255",
        leaderboardPrize: {
            title: "Homepage Banner Promotion",
            description: "Your website + custom banner featured on our homepage for 30 days!",
            duration: "30 days",
            minReferrals: 10
        },
        leaderboard: [],
        analytics: {
            visitors: 1284,
            linkCopies: 243,
            shares: { x: 34, facebook: 19, whatsapp: 22, linkedin: 8, email: 4 },
            bannerClicks: 67,
            referrals: 142,
            conversionRate: 19,
            growthData: [12, 18, 25, 31, 42, 58, 71],
            activityLog: [],
            submissions: []
        }
    };

    let referralLink = "";
    let myReferralCode = localStorage.getItem('myReferralCode') || null;
    let charts = {};

    async function loadConfig() {
        let { data: cfg } = await supabase.from('config').select('*').eq('id', 1).single();
        if (!cfg) {
            await supabase.from('config').insert([{ id: 1 }]);
            cfg = (await supabase.from('config').select('*').eq('id', 1).single()).data;
        }
        config.siteName = cfg.site_name || "AcmeApp";
        config.baseUrl = cfg.base_url || config.baseUrl;
        config.rewardText = cfg.reward_text || config.rewardText;
        config.primaryColor = cfg.primary_color || config.primaryColor;
        config.leaderboardPrize = {
            title: cfg.prize_title || "Homepage Banner Promotion",
            description: cfg.prize_description || "Your website + custom banner featured on our homepage for 30 days!",
            duration: cfg.prize_duration || "30 days",
            minReferrals: cfg.min_referrals || 10
        };
        const { data: parts } = await supabase.from('participants').select('*').order('referrals', { ascending: false });
        config.leaderboard = parts || [];
        document.documentElement.style.setProperty('--primary', config.primaryColor);
        updateAllTexts();
        renderLeaderboard();
        renderWinnerBanner();
        updateWinnerButtonVisibility();
    }

    async function handleReferralTracking() {
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) await supabase.rpc('increment_referrals', { code: refCode });
    }

    function setupRealtime() {
        supabase.channel('leaderboard').on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, () => loadConfig()).subscribe();
    }

    // === ALL YOUR ORIGINAL FUNCTIONS (full, non-truncated) ===
    function updateAllTexts() {
        document.querySelectorAll('#hero-site-name').forEach(el => el.textContent = config.siteName);
        document.getElementById('hero-subtitle').innerHTML = `Share <span class="font-semibold text-white">${config.siteName}</span> and ${config.rewardText}`;
        document.getElementById('prize-title-display').textContent = config.leaderboardPrize.title;
        document.getElementById('prize-desc-display').textContent = config.leaderboardPrize.description;
    }

    function generateReferralLink() {
        if (!referralLink) referralLink = `${config.baseUrl}/?ref=${myReferralCode || 'USER' + Math.floor(100000 + Math.random() * 900000)}`;
        document.getElementById('ref-link').value = referralLink;
        document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(referralLink)}`;
    }

    function renderWinnerBanner() {
        const winner = config.leaderboard[0];
        if (!winner) return;
        const container = document.getElementById('winner-banner');
        container.innerHTML = `
            <a href="${winner.website}" target="_blank">
                <img src="${winner.banner_url || winner.bannerUrl}" class="w-full h-auto rounded-3xl" alt="${winner.name}'s banner">
            </a>
            <div class="p-6 text-center">
                <div class="font-semibold text-xl">${winner.name} <span class="text-emerald-400">• #1</span></div>
                <div class="text-sm text-zinc-400">${winner.referrals} referrals • ${config.leaderboardPrize.duration}</div>
            </div>
        `;
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-container');
        container.innerHTML = '';
        const qualified = config.leaderboard.filter(p => p.referrals >= config.leaderboardPrize.minReferrals);
        qualified.forEach((person, index) => {
            const rank = index + 1;
            const row = document.createElement('div');
            row.className = `leaderboard-row flex items-center justify-between bg-zinc-900 border border-white/10 rounded-3xl px-8 py-6 ${rank === 1 ? 'border-amber-400 shadow-2xl shadow-amber-400/30' : ''}`;
            row.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl font-bold ${rank === 1 ? 'text-amber-400' : 'text-zinc-400'}">${rank}</div>
                    <div>
                        <div class="font-semibold text-xl">${person.name}</div>
                        <div class="text-sm text-zinc-400">${person.referrals} referrals</div>
                    </div>
                </div>
                <a href="${person.website}" target="_blank" class="text-violet-400 hover:text-violet-300 font-medium flex items-center gap-2">
                    Visit site <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            `;
            container.appendChild(row);
        });
        if (qualified.length === 0) {
            container.innerHTML = `<div class="text-center py-12 text-zinc-400">No one has reached ${config.leaderboardPrize.minReferrals} referrals yet.<br>Be the first!</div>`;
        }
        updateWinnerButtonVisibility();
    }

    function updateWinnerButtonVisibility() {
        const btn = document.getElementById('winner-claim-btn');
        const hasWinner = config.leaderboard.length > 0 && config.leaderboard[0].referrals >= config.leaderboardPrize.minReferrals;
        btn.classList.toggle('hidden', !hasWinner);
    }

    function showWinnerForm() {
        const winner = config.leaderboard[0];
        if (!winner) return;
        document.getElementById('winner-name').value = winner.name;
        document.getElementById('winner-modal').classList.remove('hidden');
    }

    function hideWinnerForm() {
        document.getElementById('winner-modal').classList.add('hidden');
    }

    async function submitWinnerForm() {
        const email = document.getElementById('winner-email').value.trim();
        const bannerUrl = document.getElementById('winner-banner-url').value.trim();
        if (!email || !bannerUrl) return alert("Email and Banner URL are required");
        const winner = config.leaderboard[0];
        const submission = { participant_id: winner.id, name: winner.name, email: email, banner_url: bannerUrl, message: document.getElementById('winner-message').value.trim() || "No message" };
        await supabase.from('submissions').insert([submission]);
        hideWinnerForm();
        showToast("✅ Submission sent! You will receive the banner details.");
    }

    function openAdminPanel() {
        const entered = prompt("🔒 Enter Admin Password (only you know this):");
        if (entered === ADMIN_PASSWORD) {
            document.getElementById('admin-modal').classList.remove('hidden');
            loadAdminFormValues();
            switchAdminTab(0);
        } else if (entered) alert("❌ Access denied. Wrong password.");
    }

    function closeAdminPanel() {
        document.getElementById('admin-modal').classList.add('hidden');
    }

    function loadAdminFormValues() {
        document.getElementById('admin-site-name').value = config.siteName;
        document.getElementById('admin-base-url').value = config.baseUrl;
        document.getElementById('admin-reward-text').value = config.rewardText;
        const hexColor = "#" + config.primaryColor.replace(/\s/g, '').split(',').map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
        const colorInput = document.getElementById('admin-primary-color');
        colorInput.value = hexColor;
        document.getElementById('color-preview').style.backgroundColor = hexColor;
        document.getElementById('prize-title').value = config.leaderboardPrize.title;
        document.getElementById('prize-desc').value = config.leaderboardPrize.description;
        document.getElementById('prize-duration').value = config.leaderboardPrize.duration;
        document.getElementById('min-referrals').value = config.leaderboardPrize.minReferrals;
        renderAdminLeaderboardList();
    }

    function renderAdminLeaderboardList() {
        const list = document.getElementById('admin-leaderboard-list');
        list.innerHTML = '';
        config.leaderboard.forEach((entry, i) => {
            const div = document.createElement('div');
            div.className = "flex gap-4 bg-zinc-800 rounded-2xl p-4 items-center";
            div.innerHTML = `
                <input type="text" value="${entry.name}" id="lb-name-${i}" class="flex-1 bg-zinc-900 border border-white/20 rounded-xl px-5 py-3">
                <input type="number" value="${entry.referrals}" id="lb-ref-${i}" class="w-28 bg-zinc-900 border border-white/20 rounded-xl px-5 py-3 text-center">
                <input type="text" value="${entry.website}" id="lb-site-${i}" class="flex-1 bg-zinc-900 border border-white/20 rounded-xl px-5 py-3">
                <input type="text" value="${entry.banner_url || entry.bannerUrl}" id="lb-banner-${i}" class="flex-1 bg-zinc-900 border border-white/20 rounded-xl px-5 py-3">
                <button onclick="removeLeaderboardEntry(${i})" class="px-4 py-3 text-rose-400 hover:bg-rose-400/10 rounded-xl"><i class="fa-solid fa-trash"></i></button>
            `;
            list.appendChild(div);
        });
    }

    function addLeaderboardEntry() {
        config.leaderboard.push({ name: "New Referrer", referrals: 10, website: "https://newsite.com", banner_url: "https://picsum.photos/id/870/600/180" });
        renderAdminLeaderboardList();
    }

    function removeLeaderboardEntry(index) {
        if (confirm("Delete this entry?")) {
            supabase.from('participants').delete().eq('id', config.leaderboard[index].id);
            config.leaderboard.splice(index, 1);
            renderAdminLeaderboardList();
            renderLeaderboard();
            updateWinnerButtonVisibility();
        }
    }

    async function saveAdminChanges() {
        await supabase.from('config').update({
            site_name: document.getElementById('admin-site-name').value.trim() || config.siteName,
            base_url: document.getElementById('admin-base-url').value.trim() || config.baseUrl,
            reward_text: document.getElementById('admin-reward-text').value.trim() || config.rewardText,
            primary_color: (() => {
                let hex = document.getElementById('admin-primary-color').value;
                if (hex.startsWith('#')) hex = hex.slice(1);
                if (hex.length === 6) {
                    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
                    return `${r} ${g} ${b}`;
                }
                return config.primaryColor;
            })(),
            prize_title: document.getElementById('prize-title').value,
            prize_description: document.getElementById('prize-desc').value,
            prize_duration: document.getElementById('prize-duration').value,
            min_referrals: parseInt(document.getElementById('min-referrals').value) || 10
        }).eq('id', 1);
        await loadConfig();
        updateAllTexts();
        renderLeaderboard();
        renderWinnerBanner();
        updateWinnerButtonVisibility();
        showToast("✅ All changes saved & live on the page!");
    }

    function switchAdminTab(tab) {
        for (let i = 0; i < 4; i++) {
            document.getElementById(`tab-content-${i}`).classList.toggle('hidden', i !== tab);
            document.getElementById(`tab-${i}`).classList.toggle('admin-tab-active', i === tab);
        }
    }

    function renderAnalytics() {
        document.getElementById('stat-visitors').textContent = config.analytics.visitors.toLocaleString();
        document.getElementById('stat-copies').textContent = config.analytics.linkCopies;
        document.getElementById('stat-shares').textContent = Object.values(config.analytics.shares).reduce((a,b)=>a+b,0);
        document.getElementById('stat-conversion').textContent = config.analytics.conversionRate + "%";
    }

    function trackEvent(action, details = "") {
        const logEntry = { time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), action, details };
        config.analytics.activityLog.unshift(logEntry);
        if (config.analytics.activityLog.length > 8) config.analytics.activityLog.pop();
    }

    function copyLink() {
        navigator.clipboard.writeText(referralLink).then(() => {
            config.analytics.linkCopies++;
            trackEvent("Link Copied", referralLink);
            showToast("✅ Link copied to clipboard!");
            confettiBurst();
        });
    }

    function shareTo(platform) {
        const message = `Join me on ${config.siteName} – help me win the homepage banner! ${referralLink}`;
        let url = '';
        if (platform === 'x') url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(message)}`;
        else if (platform === 'facebook') url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(referralLink)}`;
        else if (platform === 'whatsapp') url = `https://wa.me/?text=${encodeURIComponent(message)}`;
        else if (platform === 'linkedin') url = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(referralLink)}`;
        if (url) window.open(url, '_blank');
        config.analytics.shares[platform] = (config.analytics.shares[platform] || 0) + 1;
        trackEvent("Shared on " + platform.toUpperCase());
        confettiBurst();
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-text').innerHTML = message;
        toast.classList.remove('hidden');
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.classList.add('hidden'); toast.style.opacity = '1'; }, 300); }, 2800);
    }

    function confettiBurst() {
        confetti({ particleCount: 220, spread: 100, origin: { y: 0.6 }, colors: ['#a855f7', '#c026d3', '#22c55e', '#eab308'] });
    }

    async function getMyReferralLink() {
        const btn = document.getElementById('get-link-btn');
        const originalHTML = btn.innerHTML;
        const originalClass = btn.className;
        btn.classList.add('loading');
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-3"></i> GENERATING LINK...`;
        document.getElementById('referral-section').scrollIntoView({ behavior: 'smooth' });
        setTimeout(async () => {
            if (!myReferralCode) {
                const code = 'USER' + Math.floor(100000 + Math.random() * 900000);
                const { data } = await supabase.from('participants').insert({ referral_code: code, name: "You (Demo)", website: config.baseUrl, banner_url: "https://picsum.photos/id/870/600/180" }).select().single();
                myReferralCode = data.referral_code;
                localStorage.setItem('myReferralCode', myReferralCode);
            }
            referralLink = `${config.baseUrl}/?ref=${myReferralCode}`;
            const linkInput = document.getElementById('ref-link');
            linkInput.value = referralLink;
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(referralLink)}`;
            linkInput.classList.add('highlight-glow', 'border-emerald-400', 'text-emerald-400');
            await navigator.clipboard.writeText(referralLink);
            config.analytics.linkCopies++;
            trackEvent("Get My Referral Link Clicked + Auto-Copied");
            btn.classList.add('success');
            btn.innerHTML = `<i class="fa-solid fa-check mr-3"></i> COPIED & READY!`;
            const qr = document.getElementById('qr-code');
            qr.classList.add('qr-pulse');
            const rect = btn.getBoundingClientRect();
            const floatEl = document.createElement('div');
            floatEl.className = 'floating-ready';
            floatEl.textContent = 'LINK READY!';
            floatEl.style.left = `${rect.left + rect.width / 2 - 55}px`;
            floatEl.style.top = `${rect.top - 30}px`;
            document.body.appendChild(floatEl);
            showToast(`✅ Your referral link is <span class="font-mono text-emerald-300">copied & ready to share!</span><br><span class="text-xs opacity-70">${referralLink}</span>`);
            confettiBurst();
            confetti({ particleCount: 280, spread: 120, origin: { y: 0.5 } });
            setTimeout(() => {
                floatEl.remove();
                qr.classList.remove('qr-pulse');
                linkInput.classList.remove('highlight-glow', 'border-emerald-400', 'text-emerald-400');
                btn.classList.remove('success', 'loading');
                btn.className = originalClass;
                btn.innerHTML = originalHTML;
            }, 2800);
        }, 850);
    }

    async function simulateReferral() {
        const btn = document.getElementById('simulate-btn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> SIMULATING...`;
        btn.disabled = true;
        setTimeout(async () => {
            const added = Math.floor(Math.random() * 6) + 3;
            let target = config.leaderboard.find(p => p.name === "You (Demo)");
            if (target) {
                await supabase.from('participants').update({ referrals: target.referrals + added }).eq('name', "You (Demo)");
            } else {
                await supabase.from('participants').insert({ referral_code: 'DEMO' + Date.now(), name: "You (Demo)", website: config.baseUrl, banner_url: "https://picsum.photos/id/870/600/180", referrals: added });
            }
            await loadConfig();
            const rect = btn.getBoundingClientRect();
            const floatEl = document.createElement('div');
            floatEl.className = 'floating-referral';
            floatEl.textContent = `+${added}`;
            floatEl.style.left = `${rect.left + rect.width / 2 - 15}px`;
            floatEl.style.top = `${rect.top + rect.height / 2 - 20}px`;
            document.body.appendChild(floatEl);
            confettiBurst();
            trackEvent("Simulated Referral", `+${added} referrals added to demo user`);
            showToast(`🎉 Simulated <span class="font-mono text-emerald-400">+${added}</span> referrals for You (Demo)!`);
            document.getElementById('leaderboard').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                floatEl.remove();
            }, 2200);
        }, 720);
    }

    function generateNewCode() {
        generateReferralLink();
        showToast("New referral code generated 🔥");
    }

    function changeAdminPassword() {
        const newPass = document.getElementById('admin-new-password').value.trim();
        if (newPass.length < 4) return alert("Password too short");
        ADMIN_PASSWORD = newPass;
        showToast("🔐 New admin password saved in this browser");
        document.getElementById('admin-new-password').value = '';
    }

    function resetAllToDefaults() {
        if (confirm("Reset EVERYTHING?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function exportConfig() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
        const a = document.createElement("a");
        a.href = dataStr;
        a.download = "viral-refer-config.json";
        a.click();
        showToast("📤 Config exported");
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'A' && e.shiftKey && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            openAdminPanel();
        }
    });

    async function init() {
        await loadConfig();
        await handleReferralTracking();
        setupRealtime();
        config.analytics.visitors++;
        generateReferralLink();
        trackEvent("Page View", "Homepage loaded");
        console.log('%c✅ Viral Refer + LIVE Supabase backend loaded successfully', 'color:#a855f7; font-weight:bold');
    }

    window.onload = init;
</script>
</body>
</html>
